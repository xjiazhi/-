<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美时光舞蹈课表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cell-height: 90px; }
        .grid-table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
        .grid-table td { height: var(--cell-height); padding: 4px; border: 0.5px solid #f8fafc; vertical-align: stretch; position: relative; }
        .course-card { height: 100%; width: 100%; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 6px; color: white; position: relative; }
        #logo{width:30%;margin:auto;}
        @media (max-width: 640px) { .scroll-container { overflow-x: auto; } .grid-table { min-width: 800px; } #logo {width:60%;}}
    </style>
</head>
<body class="bg-slate-50">
    <div id="app" class="max-w-5xl mx-auto p-4 py-10">
        <div id="capture-area" class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl">
            <div id="logo" class="text-center mb-8">
                <img src="/img/logo.png" />
                <p class="text-[10px] text-slate-300 mt-2 uppercase">更新时间: {{ lastUpdate }}</p>
            </div>

            <div class="scroll-container">
                <table class="grid-table">
                    <thead>
                        <tr><th v-for="day in weekDays" class="pb-4 text-slate-400 text-xs font-bold">{{ day }}</th></tr>
                    </thead>
                    <tbody>
                        <tr v-for="rowIdx in 8">
                            <template v-for="dayIdx in 7">
                                <td v-if="shouldRender(dayIdx, rowIdx)" :rowspan="getCell(dayIdx, rowIdx).rowspan">
                                    <div v-if="getCell(dayIdx, rowIdx).teacher" class="course-card" :style="{ backgroundColor: getTeacherColor(getCell(dayIdx, rowIdx).teacher) }">
                                        <div class="font-bold text-[13px] leading-tight mb-1">{{ getCell(dayIdx, rowIdx).title }}</div>
                                        <div class="text-[9px] opacity-80 mb-1 font-mono">{{ getCell(dayIdx, rowIdx).time }}</div>
                                        <div v-if="getCell(dayIdx, rowIdx).subtitle" class="text-[10px] px-2 py-0.5 rounded-full italic">{{ getCell(dayIdx, rowIdx).subtitle }}</div>
                                        <div v-if="getCell(dayIdx, rowIdx).hasFlower" class="absolute bottom-1 right-1 w-4 h-4 text-white/80">
                                            <svg viewBox="0 0 18.33 17.61"> <g> <circle cx="8.88" cy="4.15" r="3.65" style="fill: #ffcafd; stroke: #fff; stroke-miterlimit: 10;"/> <circle cx="4.15" cy="8.19" r="3.65" style="fill: #ffcafd; stroke: #fff; stroke-miterlimit: 10;"/> <circle cx="14.19" cy="8.55" r="3.65" style="fill: #ffcafd; stroke: #fff; stroke-miterlimit: 10;"/> <circle cx="6.02" cy="13.46" r="3.65" style="fill: #ffcafd; stroke: #fff; stroke-miterlimit: 10;"/> <circle cx="11.8" cy="13.46" r="3.65" style="fill: #ffcafd; stroke: #fff; stroke-miterlimit: 10;"/> <circle cx="8.88" cy="8.99" r="3.65" style="fill: #ffcafd; stroke: #fff; stroke-miterlimit: 10;"/> </g> </svg>
                                        </div>
                                    </div>
                                </td>
                            </template>
                        </tr>
                    </tbody>
                </table>
            </div>
<div class="mt-10 flex flex-wrap justify-center gap-6 border-t border-slate-50 pt-8">
                <div v-for="t in teachers" class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full" :style="{ backgroundColor: t.color }"></span>
                    <span class="text-xs font-bold text-slate-600">{{ t.name }}</span>
                </div>
            </div>
            <div><img sytle="width:100%" src="/img/foots.jpg" /></div>

        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                const teachers = ref([]);
                const courses = ref({});
                const lastUpdate = ref('');

                const load = async () => {
                    const res = await fetch('api.php');
                    const data = await res.json();
                    teachers.value = data.teachers || [];
                    courses.value = data.courses || {};
                    lastUpdate.value = data.lastUpdate || '';
                };

                const getCell = (d, r) => courses.value[`${d}-${r}`] || { rowspan: 1 };
                const shouldRender = (d, r) => {
                    for (let i = 1; i < r; i++) {
                        const c = courses.value[`${d}-${i}`];
                        if (c && c.teacher && c.rowspan > (r - i)) return false;
                    }
                    return true;
                };
                onMounted(load);
                return { weekDays, teachers, courses, lastUpdate, getCell, shouldRender, getTeacherColor: n => teachers.value.find(t => t.name === n)?.color };
            }
        }).mount('#app');
    </script>
</body>
</html>
